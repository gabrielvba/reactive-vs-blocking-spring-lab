services:
  ms-producer-picture:
    build:
      context: ./app/providers/ms-producer-picture
      dockerfile: Dockerfile
    container_name: ms-producer-picture
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - observability
    restart: unless-stopped

  ms-files-managment:
    build:
      context: .
      dockerfile: ./app/consumers/ms-files-managment/Dockerfile
    container_name: ms-files-managment
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - FILE_SERVICE_BASE_URL=http://ms-producer-picture:8081
    volumes:
      - ./results:/app/results  # Salvar resultados dos testes k6
      - ./results/prometheus-exports:/app/prometheus-exports  # Exportar séries temporais e dumps
    depends_on:
      - ms-producer-picture
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 384M
    networks:
      - observability
    restart: unless-stopped

  ms-files-management-reactive:
    build:
      context: .
      dockerfile: ./app/consumers/ms-files-management-reactive/Dockerfile
    container_name: ms-files-management-reactive
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - FILE_SERVICE_BASE_URL=http://ms-producer-picture:8081
    volumes:
      - ./results:/app/results  # Salvar resultados dos testes k6
      - ./results/prometheus-exports:/app/prometheus-exports  # Exportar séries temporais e dumps
    depends_on:
      - ms-producer-picture
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 384M
    networks:
      - observability
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: msf-prometheus
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=6h'
      - '--web.enable-remote-write-receiver'
    ports:
      - "9090:9090"
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: msf-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - observability
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: msf-cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks:
      - observability
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  observability:
    driver: bridge

